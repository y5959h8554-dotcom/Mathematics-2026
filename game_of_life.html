<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu de la vie</title>
<style>
  :root {
    --bg: #0a0a0a;
    --grid: #282828;
    --alive: #00c8ff;
    --btn: #3c3c3c;
    --btn-hover: #646464;
    --text: #ffffff;
    --panel: rgba(18,18,18,0.78);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    overflow: hidden;
  }
  #grid {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: crosshair;
  }
  /* Toolbar */
  #bar {
    position: absolute;
    top: 12px; left: 12px;
    display: flex; align-items: center; gap: 8px;
    background: var(--panel);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 8px 10px;
    backdrop-filter: blur(4px);
    user-select: none;
    flex-wrap: wrap;
    max-width: calc(100vw - 24px);
  }
  .btn {
    background: var(--btn);
    color: var(--text);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background .12s ease;
    white-space: nowrap;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn.primary { background: #145a6e; }
  .btn.primary:hover { background: #1d7a93; }
  .readout {
    font-size: 13px; color: #bdbdbd;
    padding: 0 6px; white-space: nowrap;
  }
  .readout b { color: var(--alive); font-weight: 600; }
  .sep { width: 1px; height: 22px; background: #3a3a3a; margin: 0 2px; }
  #hint {
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #777;
    background: var(--panel);
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 5px 12px;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="grid"></canvas>

<div id="bar">
  <button class="btn primary" id="playBtn">▶ Démarrer</button>
  <button class="btn" id="stepBtn">Pas à pas</button>
  <div class="sep"></div>
  <button class="btn" id="fpsDown">– vitesse</button>
  <span class="readout"><b id="fpsVal">10</b> gén/s</span>
  <button class="btn" id="fpsUp">+ vitesse</button>
  <div class="sep"></div>
  <button class="btn" id="randomBtn">Aléatoire</button>
  <button class="btn" id="clearBtn">Effacer</button>
  <div class="sep"></div>
  <span class="readout">Génération <b id="genVal">0</b></span>
</div>

<div id="hint">Clic gauche : dessiner · clic droit : effacer · glisser pour peindre · ESPACE : lecture/pause · C : effacer</div>

<script>
const CELL = 16;                 // cell size in CSS pixels
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');

let COLS = 0, ROWS = 0;
let grid = null;                 // Uint8Array, length ROWS*COLS
let simulate = false;
let fps = 10;
let generation = 0;

// ── Colors (from CSS vars so theming stays in one place) ──
const css = getComputedStyle(document.documentElement);
const C_BG    = css.getPropertyValue('--bg').trim()    || '#0a0a0a';
const C_GRID  = css.getPropertyValue('--grid').trim()  || '#282828';
const C_ALIVE = css.getPropertyValue('--alive').trim() || '#00c8ff';

const idx = (r, c) => r * COLS + c;

// ── Sizing: canvas fills the viewport; grid dimensions follow ──
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // draw in CSS pixels

  const newCols = Math.floor(w / CELL);
  const newRows = Math.floor(h / CELL);
  const next = new Uint8Array(newRows * newCols);
  // Preserve overlapping cells when the window changes size.
  if (grid){
    const rr = Math.min(ROWS, newRows), cc = Math.min(COLS, newCols);
    for (let r = 0; r < rr; r++)
      for (let c = 0; c < cc; c++)
        next[r*newCols + c] = grid[r*COLS + c];
  }
  COLS = newCols; ROWS = newRows; grid = next;
  draw();
}
window.addEventListener('resize', resize);

// ── Conway step (toroidal wrap, matching the original modulo logic) ──
function update(){
  const next = new Uint8Array(ROWS * COLS);
  for (let r = 0; r < ROWS; r++){
    const rm = (r - 1 + ROWS) % ROWS;
    const rp = (r + 1) % ROWS;
    for (let c = 0; c < COLS; c++){
      const cm = (c - 1 + COLS) % COLS;
      const cp = (c + 1) % COLS;
      const total =
        grid[idx(rm,cm)] + grid[idx(rm,c)] + grid[idx(rm,cp)] +
        grid[idx(r ,cm)]                   + grid[idx(r ,cp)] +
        grid[idx(rp,cm)] + grid[idx(rp,c)] + grid[idx(rp,cp)];
      const alive = grid[idx(r,c)];
      // Conway rules
      if (alive && (total === 2 || total === 3)) next[idx(r,c)] = 1;
      else if (!alive && total === 3)           next[idx(r,c)] = 1;
      // else stays 0
    }
  }
  grid = next;
  generation++;
  document.getElementById('genVal').textContent = generation;
}

// ── Render ──
function draw(){
  const w = window.innerWidth, h = window.innerHeight;
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, w, h);

  // grid lines (drawn as 1px strokes around each cell, like the original)
  ctx.strokeStyle = C_GRID;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let c = 0; c <= COLS; c++){
    const x = c * CELL + 0.5;
    ctx.moveTo(x, 0); ctx.lineTo(x, ROWS * CELL);
  }
  for (let r = 0; r <= ROWS; r++){
    const y = r * CELL + 0.5;
    ctx.moveTo(0, y); ctx.lineTo(COLS * CELL, y);
  }
  ctx.stroke();

  // alive cells
  ctx.fillStyle = C_ALIVE;
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      if (grid[idx(r,c)]){
        ctx.fillRect(c*CELL, r*CELL, CELL-1, CELL-1);
      }
    }
  }
}

// ── Simulation timing: render at 60fps, step at `fps` generations/sec ──
let lastStep = 0;
function loop(ts){
  if (simulate){
    const interval = 1000 / fps;
    if (ts - lastStep >= interval){
      update();
      lastStep = ts;
      draw();
    }
  }
  requestAnimationFrame(loop);
}

// ── Painting (click + drag) ──
let painting = false;
let paintValue = 1;   // 1 = draw alive (left), 0 = erase (right)

function cellAt(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((clientX - rect.left) / CELL);
  const r = Math.floor((clientY - rect.top) / CELL);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return [r, c];
  return null;
}
function paint(clientX, clientY){
  const cell = cellAt(clientX, clientY);
  if (!cell) return;
  const [r, c] = cell;
  if (grid[idx(r,c)] !== paintValue){
    grid[idx(r,c)] = paintValue;
    draw();
  }
}

canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  painting = true;
  paintValue = (e.button === 2) ? 0 : 1;   // right-click erases
  paint(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => { if (painting) paint(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { painting = false; });

// Touch painting (draw only; toggle off with the eraser idea is awkward on touch,
// so a single-finger touch always draws alive cells).
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  painting = true; paintValue = 1;
  const t = e.changedTouches[0];
  paint(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!painting) return;
  const t = e.changedTouches[0];
  paint(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); painting = false; }, {passive:false});

// ── Controls ──
const playBtn = document.getElementById('playBtn');
function setSimulate(on){
  simulate = on;
  playBtn.textContent = simulate ? '⏸ Pause' : '▶ Démarrer';
  lastStep = performance.now();
}
playBtn.addEventListener('click', () => setSimulate(!simulate));

document.getElementById('stepBtn').addEventListener('click', () => {
  update(); draw();
});
function setFps(v){
  fps = Math.max(1, Math.min(60, v));
  document.getElementById('fpsVal').textContent = fps;
}
document.getElementById('fpsUp').addEventListener('click', () => setFps(fps + 1));
document.getElementById('fpsDown').addEventListener('click', () => setFps(fps - 1));

document.getElementById('randomBtn').addEventListener('click', () => {
  for (let i = 0; i < grid.length; i++) grid[i] = Math.random() < 0.28 ? 1 : 0;
  generation = 0;
  document.getElementById('genVal').textContent = 0;
  draw();
});
function clearGrid(){
  grid.fill(0);
  generation = 0;
  document.getElementById('genVal').textContent = 0;
  draw();
}
document.getElementById('clearBtn').addEventListener('click', clearGrid);

// ── Keyboard ──
window.addEventListener('keydown', e => {
  if (e.code === 'Space'){ e.preventDefault(); setSimulate(!simulate); }
  else if (e.key === 'c' || e.key === 'C'){ clearGrid(); }
});

// ── Start ──
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
