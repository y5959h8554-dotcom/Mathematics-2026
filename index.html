<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Activités interactives</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080d;
    --bg-soft: #0d0f17;
    --ink: #f2f0ea;
    --ink-dim: #8b8a96;
    --hair: rgba(255,255,255,0.08);

    --arith: #b388ff;  --arith-deep: #2a1a4d;  --arith-lit: #d9c6ff;
    --prob:  #ff9d4d;  --prob-deep:  #3a210a;  --prob-lit:  #ffd9a8;
    --model: #3ddc97;  --model-deep: #0e3326;  --model-lit: #aef0cf;
    --anim:  #4dd6ff;  --anim-deep:  #0c2a3a;  --anim-lit:  #c5eeff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; overflow: hidden;
    position: relative;
  }
  #field {
    position: fixed; inset: 0; z-index: 0;
    width: 100vw; height: 100vh; display: block;
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 120% 80% at 50% 0%, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  /* ── Title as the "sun" in the top-left ── */
  header {
    position: absolute; z-index: 5;
    top: 30px; left: 48px;
    text-align: left;
    max-width: 56vw;
    pointer-events: none;
    transition: opacity .35s ease;
  }
  h1 {
    font-weight: 300; font-size: clamp(32px, 5vw, 64px);
    line-height: 0.95; letter-spacing: -0.03em; margin: 0;
    color: #fff7ea;
    /* warm solar halo; --sun-r/g/b override per category in detail mode */
    --sun-r: 255; --sun-g: 200; --sun-b: 128;
    text-shadow:
      0 0 6px  rgba(255, 244, 210, 0.95),                                /* tight incandescent core */
      0 0 26px rgba(255, 228, 180, 0.95),
      0 0 68px rgba(var(--sun-r), var(--sun-g), var(--sun-b), 0.78),
      0 0 140px rgba(var(--sun-r), var(--sun-g), var(--sun-b), 0.58);
    opacity: 0;
    animation: fadeIn .8s cubic-bezier(.2,.7,.2,1) forwards .1s;
    transition: text-shadow .5s ease;
  }
  .sun-glow {
    position: fixed; z-index: 1; pointer-events: none;
    top: -240px; left: -240px;
    width: 900px; height: 900px;
    background: radial-gradient(circle at 30% 30%,
      rgba(255,224,170,0.55) 0%,
      rgba(255,196,120,0.34) 22%,
      rgba(255,170,90,0.16)  44%,
      rgba(255,150,70,0.06)  62%,
      transparent 78%);
    opacity: 0;
    animation: fadeIn 1.4s ease forwards .2s;
    transition: background .5s ease;
  }

  /* When viewing a category in detail, recolor the sun glow to that category. */
  body.detail-arith h1 { --sun-r: 200; --sun-g: 170; --sun-b: 255; }
  body.detail-arith .sun-glow {
    background: radial-gradient(circle at 30% 30%,
      rgba(220,196,255,0.58) 0%,
      rgba(180,148,240,0.38) 22%,
      rgba(140,108,220,0.18) 44%,
      rgba(110,80,200,0.06)  62%,
      transparent 78%);
  }
  body.detail-prob h1 { --sun-r: 255; --sun-g: 180; --sun-b: 110; }
  body.detail-prob .sun-glow {
    background: radial-gradient(circle at 30% 30%,
      rgba(255,212,156,0.58) 0%,
      rgba(255,172,108,0.38) 22%,
      rgba(230,132,72,0.18)  44%,
      rgba(200,100,50,0.06)  62%,
      transparent 78%);
  }
  body.detail-model h1 { --sun-r: 130; --sun-g: 230; --sun-b: 180; }
  body.detail-model .sun-glow {
    background: radial-gradient(circle at 30% 30%,
      rgba(160,240,200,0.55) 0%,
      rgba(100,212,162,0.36) 22%,
      rgba(60,180,128,0.17)  44%,
      rgba(40,150,108,0.06)  62%,
      transparent 78%);
  }
  body.detail-anim h1 { --sun-r: 130; --sun-g: 215; --sun-b: 255; }
  body.detail-anim .sun-glow {
    background: radial-gradient(circle at 30% 30%,
      rgba(180,232,255,0.58) 0%,
      rgba(120,200,250,0.38) 22%,
      rgba(70,160,225,0.18)  44%,
      rgba(40,120,195,0.06)  62%,
      transparent 78%);
  }
  .back-btn {
    position: absolute; z-index: 5; top: 32px; right: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hair);
    border-radius: 8px;
    padding: 10px 16px; cursor: pointer;
    opacity: 0; visibility: hidden;
    transition: opacity .4s ease, visibility .4s, background .2s, color .2s;
    font-weight: 400;
  }
  .back-btn:hover { background: rgba(255,255,255,0.08); color: var(--ink); }
  body.detail .back-btn { opacity: 1; visibility: visible; transition-delay: .25s; }

  /* ── Stage holds the three "systems" (planet + its moons) ── */
  .stage { position: fixed; inset: 0; z-index: 2; }

  /* A system is a 0×0 anchor whose children are absolutely placed around it.
     Default = home position (triangle). When .active and body.detail, → center. */
  .system {
    position: absolute; width: 0; height: 0;
    transition: top .85s cubic-bezier(.5,.0,.2,1),
                left .85s cubic-bezier(.5,.0,.2,1),
                opacity .5s ease;
  }
  .system[data-key="arith"] { top: 32%; left: 33%; }
  .system[data-key="anim"]  { top: 32%; left: 75%; }
  .system[data-key="prob"]  { top: 70%; left: 61%; }
  .system[data-key="model"] { top: 70%; left: 19%; }
  body.detail .system.active { top: 50%; left: 50%; }
  body.detail .system:not(.active) { opacity: 0; pointer-events: none; }

  /* ── Planet (the clickable category disc) ──
     Uses the same lit-sphere treatment as the moons / earlier tiles. */
  .planet {
    position: absolute; left: 0; top: 0;
    transform: translate(-50%, -50%);
    width: 180px; height: 180px;
    border-radius: 50%;
    cursor: pointer;
    overflow: hidden; isolation: isolate;
    background: var(--bg-soft);
    transition: width .85s cubic-bezier(.5,0,.2,1),
                height .85s cubic-bezier(.5,0,.2,1),
                filter .25s, box-shadow .25s;
    /* directional lighting (sun is top-left) */
    box-shadow:
      inset -22px -22px 50px rgba(0,0,0,0.74),
      inset 14px 14px 36px rgba(255,255,255,0.06);
  }
  .planet::before {
    content: ""; position: absolute; inset: 0; z-index: -1;
    background: radial-gradient(circle at 30% 26%,
      var(--lit), var(--glow-deep) 42%, #05060b 86%);
  }
  /* rim crescent on the lit upper-left edge */
  .planet::after {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 26% 22%, rgba(255,255,255,0.40), transparent 26%);
    mix-blend-mode: screen;
    pointer-events: none;
    transition: opacity .25s;
  }
  body:not(.detail) .planet:hover {
    width: 196px; height: 196px;
    filter: brightness(1.08);
  }
  body.detail .system.active .planet {
    width: 340px; height: 340px;
    cursor: default; pointer-events: none;
  }

  /* Category color assignments (same palette as the moons). */
  .planet-arith { --lit: var(--arith-lit); --glow-deep: var(--arith-deep); --glow: var(--arith); }
  .planet-prob  { --lit: var(--prob-lit);  --glow-deep: var(--prob-deep);  --glow: var(--prob); }
  .planet-model { --lit: var(--model-lit); --glow-deep: var(--model-deep); --glow: var(--model); }
  .planet-anim  { --lit: var(--anim-lit);  --glow-deep: var(--anim-deep);  --glow: var(--anim); }

  /* Planet label sits below the planet; grows when active */
  .planet-label {
    position: absolute; left: 0; top: 110px;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase;
    font-weight: 500; white-space: nowrap;
    transition: top .85s cubic-bezier(.5,0,.2,1), font-size .85s, opacity .35s;
  }
  .system[data-key="arith"] .planet-label { color: var(--arith); }
  .system[data-key="prob"]  .planet-label { color: var(--prob); }
  .system[data-key="model"] .planet-label { color: var(--model); }
  .system[data-key="anim"]  .planet-label { color: var(--anim); }
  body.detail .system.active .planet-label {
    opacity: 0;
  }

  /* ── Orbit rings (tilted ellipses, dotted outline) ── */
  .orbit-rings {
    position: absolute; left: 0; top: 0;
    width: 1100px; height: 460px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity .55s ease;
    overflow: visible;
  }
  body.detail .system.active .orbit-rings {
    opacity: 1; transition-delay: .45s;
  }
  .orbit-ring {
    fill: none; stroke-width: 1; stroke-dasharray: 2 5;
  }
  .system[data-key="arith"] .orbit-ring { stroke: rgba(179,136,255, 0.28); }
  .system[data-key="prob"]  .orbit-ring { stroke: rgba(255,157,77, 0.30); }
  .system[data-key="model"] .orbit-ring { stroke: rgba(61,220,151, 0.28); }
  .system[data-key="anim"]  .orbit-ring { stroke: rgba(77,214,255, 0.30); }

  /* ── Moons (positions driven by JS along their assigned ellipse) ── */
  /* .moon-pos is a 0×0 anchor; JS sets its transform every frame.
     The .moon child is self-centered, so it grows/shrinks on hover without
     fighting the JS-controlled positioning. */
  .moon-pos {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0;
    opacity: 0; pointer-events: none;
    transition: opacity .55s ease;
  }
  body.detail .system.active .moon-pos {
    opacity: 1; pointer-events: auto;
    transition-delay: .55s;
  }

  .moon {
    position: absolute; left: 0; top: 0;
    transform: translate(-50%, -50%);
    width: 108px; height: 108px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 10px;
    text-decoration: none; color: var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 12.5px; line-height: 1.15; letter-spacing: -0.01em;
    background: var(--bg-soft);
    overflow: hidden; isolation: isolate;
    box-shadow:
      inset -10px -10px 22px rgba(0,0,0,0.78),
      inset 6px 6px 16px rgba(255,255,255,0.05);
    text-shadow: 0 1px 4px rgba(0,0,0,0.85), 0 0 2px rgba(0,0,0,0.6);
    transition: width .25s, height .25s, box-shadow .25s, filter .25s;
  }
  .moon::before {
    content: ""; position: absolute; inset: 0; z-index: -1;
    background: radial-gradient(circle at 30% 26%, var(--lit), var(--glow-deep) 42%, #05060b 86%);
  }
  .moon::after {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 26% 22%, rgba(255,255,255,0.42), transparent 28%);
    mix-blend-mode: screen;
    opacity: 0.7; pointer-events: none;
    transition: opacity .25s;
  }
  .moon-arith { --lit: var(--arith-lit); --glow-deep: var(--arith-deep); --glow: var(--arith); }
  .moon-prob  { --lit: var(--prob-lit);  --glow-deep: var(--prob-deep);  --glow: var(--prob); }
  .moon-model { --lit: var(--model-lit); --glow-deep: var(--model-deep); --glow: var(--model); }
  .moon-anim  { --lit: var(--anim-lit);  --glow-deep: var(--anim-deep);  --glow: var(--anim); }

  .moon:hover {
    width: 120px; height: 120px;
    filter: brightness(1.12);
    box-shadow:
      inset -10px -10px 22px rgba(0,0,0,0.65),
      inset 6px 6px 16px rgba(255,255,255,0.09),
      0 0 38px -4px var(--glow);
  }
  .moon:hover::after { opacity: 1; }

  /* Z-ordering: planet sits at z 2; JS sets moon-pos z-index to 1 (behind) or 3 (in front). */
  .planet { z-index: 2; }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Responsive: keep it sane on phones / portrait iPad.
     JS will swap to smaller orbit specs below this breakpoint via the same
     media-query check; we just shrink the planet + moon visuals here. */
  @media (max-width: 720px) {
    .planet { width: 140px; height: 140px; }
    .system[data-key="arith"] { top: 14%; left: 50%; }
    .system[data-key="anim"]  { top: 38%; left: 50%; }
    .system[data-key="prob"]  { top: 62%; left: 50%; }
    .system[data-key="model"] { top: 86%; left: 50%; }
    body:not(.detail) .planet:hover { width: 152px; height: 152px; }
    body.detail .system.active .planet { width: 240px; height: 240px; }
    .planet-label { top: 90px; font-size: 11px; letter-spacing: 0.18em; }
    .orbit-rings { width: 540px; height: 280px; }
    .moon { width: 90px; height: 90px; font-size: 11px; padding: 8px; }
    .moon:hover { width: 100px; height: 100px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition-duration: 0s !important; }
    #field { display: none; }
    .moon-pos { transition: opacity .3s ease; }
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<div class="sun-glow"></div>

<header><h1 id="title">Activités interactives</h1></header>
<button class="back-btn" id="back" aria-label="Retour à la vue d'ensemble">← Retour</button>

<div class="stage" id="stage">

  <!-- ARITHMÉTIQUE -->
  <div class="system" data-key="arith">
    <div class="planet planet-arith"></div>
    <div class="planet-label">Arithmétique</div>
    <svg class="orbit-rings" viewBox="-550 -230 1100 460" preserveAspectRatio="xMidYMid meet">
      <ellipse class="orbit-ring" cx="0" cy="0" rx="210" ry="84"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="290" ry="116"/>
    </svg>
    <div class="moon-pos" data-orbit="1">
      <a class="moon moon-arith" href="division_euclidienne.html">Division euclidienne</a>
    </div>
    <div class="moon-pos" data-orbit="2">
      <a class="moon moon-arith" href="demon_core.html">Demon core</a>
    </div>
  </div>

  <!-- ANIMATIONS -->
  <div class="system" data-key="anim">
    <div class="planet planet-anim"></div>
    <div class="planet-label">Animations</div>
    <svg class="orbit-rings" viewBox="-550 -230 1100 460" preserveAspectRatio="xMidYMid meet">
      <ellipse class="orbit-ring" cx="0" cy="0" rx="210" ry="84"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="290" ry="116"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="250" ry="100"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="360" ry="144"/>
    </svg>
    <div class="moon-pos" data-orbit="1">
      <a class="moon moon-anim" href="#">Activité 1</a>
    </div>
    <div class="moon-pos" data-orbit="2">
      <a class="moon moon-anim" href="#">Activité 2</a>
    </div>
    <div class="moon-pos" data-orbit="3">
      <a class="moon moon-anim" href="#">Activité 3</a>
    </div>
    <div class="moon-pos" data-orbit="4">
      <a class="moon moon-anim" href="#">Activité 4</a>
    </div>
  </div>

  <!-- PROBABILITÉS -->
  <div class="system" data-key="prob">
    <div class="planet planet-prob"></div>
    <div class="planet-label">Probabilités</div>
    <svg class="orbit-rings" viewBox="-550 -230 1100 460" preserveAspectRatio="xMidYMid meet">
      <ellipse class="orbit-ring" cx="0" cy="0" rx="210" ry="84"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="290" ry="116"/>
    </svg>
    <div class="moon-pos" data-orbit="1">
      <a class="moon moon-prob" href="dice_roller.html">Lancer de dés</a>
    </div>
    <div class="moon-pos" data-orbit="2">
      <a class="moon moon-prob" href="Garde_robe/index.html">La garde-robe d'Éloïse</a>
    </div>
  </div>

  <!-- MODÉLISATION -->
  <div class="system" data-key="model">
    <div class="planet planet-model"></div>
    <div class="planet-label">Modélisation</div>
    <svg class="orbit-rings" viewBox="-550 -230 1100 460" preserveAspectRatio="xMidYMid meet">
      <ellipse class="orbit-ring" cx="0" cy="0" rx="210" ry="84"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="290" ry="116"/>
      <ellipse class="orbit-ring" cx="0" cy="0" rx="250" ry="100"/>
    </svg>
    <div class="moon-pos" data-orbit="1">
      <a class="moon moon-model" href="demogorgon_equation.html">Eleven, Will et le Demogorgon</a>
    </div>
    <div class="moon-pos" data-orbit="2">
      <a class="moon moon-model" href="orbital_cannon.html">Canon orbital</a>
    </div>
    <div class="moon-pos" data-orbit="3">
      <a class="moon moon-model" href="game_of_life.html">Jeu de la vie</a>
    </div>
  </div>

</div>

<script>
const HOME_TITLE = 'Activités interactives';
const CATEGORY_TITLE = { arith: 'Arithmétique', prob: 'Probabilités', model: 'Modélisation', anim: 'Animations' };
const titleEl = document.getElementById('title');

// ── Orbit specs (must match the SVG ellipse rx/ry values).
// Wide screen / desktop values. Mobile values applied below 720px width.
// Orbit 4 is the outermost — used only by the Animations system. ──
const ORBITS_DESKTOP = {
  '1': { rx: 440, ry: 180, period: 180000, phase: 0 },
  '2': { rx: 520, ry: 210, period: 240000, phase: -60000 },
  '3': { rx: 480, ry: 195, period: 200000, phase: -130000 },
  '4': { rx: 560, ry: 224, period: 220000, phase: -90000 }
};
const ORBITS_MOBILE = {
  '1': { rx: 145, ry: 58,  period:  180000, phase: 0 },
  '2': { rx: 195, ry: 78,  period:  240000, phase: -60000 },
  '3': { rx: 170, ry: 68,  period:  200000, phase: -130000 },
  '4': { rx: 220, ry: 88,  period:  220000, phase: -90000 }
};
const mobileMQ = window.matchMedia('(max-width: 720px)');
let ORBITS = mobileMQ.matches ? ORBITS_MOBILE : ORBITS_DESKTOP;
mobileMQ.addEventListener('change', e => {
  ORBITS = e.matches ? ORBITS_MOBILE : ORBITS_DESKTOP;
  // The SVG ring ellipses are styled in CSS; mobile media query already shrinks
  // the .orbit-rings size to keep visual proportions. (Stroke/dash stays the same.)
  resizeRings();
});

// Resize SVG ellipse rx/ry to match the active orbit specs. Iterates whatever
// ring count each system declares — Animations has 4, others have 2 or 3.
function resizeRings(){
  document.querySelectorAll('.system').forEach(sys => {
    sys.querySelectorAll('.orbit-ring').forEach((el, i) => {
      const o = ORBITS[String(i + 1)];
      if (!o) return;
      el.setAttribute('rx', o.rx);
      el.setAttribute('ry', o.ry);
    });
  });
}
resizeRings();

// ── Frame loop: position each .moon-pos along its assigned ellipse, set z-index. ──
const moonPositions = document.querySelectorAll('.moon-pos');
const animStart = performance.now();
function animateMoons(now){
  // Only animate moons of the currently-active system to save cycles.
  const activeSys = document.querySelector('.system.active');
  if (activeSys){
    const t = now - animStart;
    activeSys.querySelectorAll('.moon-pos').forEach(mp => {
      const o = ORBITS[mp.dataset.orbit];
      if (!o) return;
      const angle = ((t + o.phase) / o.period) * Math.PI * 2;
      const x = o.rx * Math.cos(angle);
      const y = o.ry * Math.sin(angle);
      mp.style.transform = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
      // Moon on lower half (y > 0) is in front of planet; upper half is behind.
      mp.style.zIndex = y > 0 ? 3 : 1;
    });
  }
  requestAnimationFrame(animateMoons);
}
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  requestAnimationFrame(animateMoons);
} else {
  // Reduced motion: place moons at their initial positions but don't animate.
  document.querySelectorAll('.moon-pos').forEach(mp => {
    const o = ORBITS[mp.dataset.orbit];
    if (!o) return;
    const angle = (o.phase / o.period) * Math.PI * 2;
    const x = o.rx * Math.cos(angle), y = o.ry * Math.sin(angle);
    mp.style.transform = `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px)`;
    mp.style.zIndex = y > 0 ? 3 : 1;
  });
}

// Click a planet → activate its system, switch body to detail mode,
// swap the title text to the category name (it becomes the new sun).
document.querySelectorAll('.planet').forEach(p => {
  p.addEventListener('click', e => {
    const system = e.target.closest('.system');
    const key = system.dataset.key;
    document.querySelectorAll('.system').forEach(s => s.classList.remove('active'));
    system.classList.add('active');
    // clean any previous detail-* class, then apply the current one
    document.body.classList.remove('detail-arith', 'detail-prob', 'detail-model', 'detail-anim');
    document.body.classList.add('detail', 'detail-' + key);
    titleEl.textContent = CATEGORY_TITLE[key] || HOME_TITLE;
  });
});

// Back to home. Note: we strip .active immediately rather than on a timeout.
// The back-transition is driven entirely by body.detail being removed; the
// .active class doesn't need to linger, and lingering caused a race where a
// quick subsequent planet click would have its .active stripped by the
// pending setTimeout, making the new system's moons fail to appear.
document.getElementById('back').addEventListener('click', () => {
  document.body.classList.remove('detail', 'detail-arith', 'detail-prob', 'detail-model', 'detail-anim');
  document.querySelectorAll('.system').forEach(s => s.classList.remove('active'));
  titleEl.textContent = HOME_TITLE;
});

// Escape key also returns home
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.body.classList.contains('detail')) {
    document.getElementById('back').click();
  }
});

// ── Drifting starfield (kept from earlier design) ──
const cv = document.getElementById('field');
const cx = cv.getContext('2d');
let W, H, pts, DPR;
function sizeField() {
  DPR = window.devicePixelRatio || 1;
  const vp = window.visualViewport;
  W = vp ? vp.width : window.innerWidth;
  H = vp ? vp.height : window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const n = Math.min(90, Math.floor(W*H/22000));
  pts = Array.from({length:n}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.22, vy: (Math.random()-0.5)*0.22,
    r: Math.random()*1.3+0.4
  }));
}
sizeField();
window.addEventListener('resize', sizeField);
window.addEventListener('orientationchange', sizeField);
if (window.visualViewport) window.visualViewport.addEventListener('resize', sizeField);

const LINK = 130;
function tick() {
  cx.clearRect(0, 0, W, H);
  for (const p of pts) {
    p.x += p.vx; p.y += p.vy;
    if (p.x<0) p.x+=W; if (p.x>W) p.x-=W;
    if (p.y<0) p.y+=H; if (p.y>H) p.y-=H;
  }
  for (let i=0; i<pts.length; i++)
    for (let j=i+1; j<pts.length; j++) {
      const a=pts[i], b=pts[j], dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy;
      if (d2 < LINK*LINK) {
        cx.strokeStyle = `rgba(150,170,255,${(1-Math.sqrt(d2)/LINK)*0.12})`;
        cx.lineWidth = 1; cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y); cx.stroke();
      }
    }
  for (const p of pts) {
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    cx.fillStyle = 'rgba(200,210,255,0.5)'; cx.fill();
  }
  requestAnimationFrame(tick);
}
if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) requestAnimationFrame(tick);
</script>
</body>
