<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathématiques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --text: #1a1916;
    --text-muted: #6b6860;

    --arith-light: #ede4f5;
    --arith-light-hover: #e2d4f0;
    --arith-mid: #7c3aed;
    --arith-dark: #4c1d95;

    --prob-light: #fff0e0;
    --prob-light-hover: #ffe4c8;
    --prob-mid: #d45f00;
    --prob-dark: #7a2e00;

    --model-light: #d4f0e6;
    --model-light-hover: #c1e7d6;
    --model-mid: #15803d;
    --model-dark: #14532d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 64px 16px 96px;
  }
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  header p {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.02em;
  }
  .wrap {
    max-width: 1000px;
    margin: 0 auto;
  }
  .section {
    margin-bottom: 40px;
  }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 260px);
    gap: 14px;
  }
  .tile {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
    padding: 22px 24px;
    border-radius: 14px;
    text-decoration: none;
    transition: transform 0.15s, background 0.15s;
    cursor: pointer;
  }
  .tile:hover { transform: translateY(-2px); }
  .tile:active { transform: translateY(0); }

  .tile-arith {
    background: var(--arith-light);
    border: 1.5px solid var(--arith-mid);
    color: var(--arith-dark);
  }
  .tile-arith:hover { background: var(--arith-light-hover); }

  .tile-prob {
    background: var(--prob-light);
    border: 1.5px solid var(--prob-mid);
    color: var(--prob-dark);
  }
  .tile-prob:hover { background: var(--prob-light-hover); }

  .tile-model {
    background: var(--model-light);
    border: 1.5px solid var(--model-mid);
    color: var(--model-dark);
  }
  .tile-model:hover { background: var(--model-light-hover); }

  .tile-title {
    font-size: 19px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .tile-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
  }
  .tile-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    opacity: 0.55;
    letter-spacing: 0.06em;
  }
  .tile-arrow {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    opacity: 0.5;
    transition: opacity 0.15s, transform 0.15s;
  }
  .tile:hover .tile-arrow {
    opacity: 1;
    transform: translateX(3px);
  }
</style>
</head>
<body>
<header>
  <p>Activités interactives</p>
</header>

<div class="wrap">
  <div class="section">
    <div class="section-label">Arithmétique</div>
    <div class="grid">
      <a class="tile tile-arith" href="division_euclidienne.html">
        <div class="tile-title">Division euclidienne</div>
        <div class="tile-footer"><span class="tile-number">01</span><span class="tile-arrow">→</span></div>
      </a>
      <a class="tile tile-arith" href="demon_core.html">
        <div class="tile-title">Demon core</div>
        <div class="tile-footer"><span class="tile-number">02</span><span class="tile-arrow">→</span></div>
      </a>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Probabilités</div>
    <div class="grid">
      <a class="tile tile-prob" href="dice_roller.html">
        <div class="tile-title">Lancer de dés</div>
        <div class="tile-footer"><span class="tile-number">03</span><span class="tile-arrow">→</span></div>
      </a>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Modélisation</div>
    <div class="grid">
      <a class="tile tile-model" href="demogorgon_equation.html">
        <div class="tile-title">Eleven, Will et le Demogorgon</div>
        <div class="tile-footer"><span class="tile-number">04</span><span class="tile-arrow">→</span></div>
      </a>
    </div>
  </div>
</div>
</body>
</html>
