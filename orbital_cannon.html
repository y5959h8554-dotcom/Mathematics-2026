<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Cannon</title>
<style>
  :root {
    --bg: #06060f;
    --panel: rgba(16,18,34,0.82);
    --line: #2a2f4a;
    --accent: #ff9a4d;
    --accent-dim: #c8632e;
    --text: #e8e6df;
    --text-soft: #9b98ab;
    --danger: #ff5a4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: #000;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
  /* Loading veil */
  #veil {
    position: absolute; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-soft);
    font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase;
    z-index: 10;
    transition: opacity .4s ease;
  }
  #veil.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1300" height="800"></canvas>
  <div id="veil">chargement…</div>
</div>

const sprites = {};
let assetsReady = 0;
const assetKeys = Object.keys(ASSET_SRC);

function loadAssets(done){
  assetKeys.forEach(k => {
    const img = new Image();
    img.onload = () => { assetsReady++; if (assetsReady === assetKeys.length) done(); };
    img.onerror = () => { assetsReady++; if (assetsReady === assetKeys.length) done(); };
    img.src = ASSET_SRC[k];
    sprites[k] = img;
  });
}

// ─── Sliders ───
// value range + display fn mirror the original.
class Slider {
  constructor(x, y, length, minVal, maxVal, value, name, displayFn){
    this.x = x; this.y = y; this.length = length;
    this.minVal = minVal; this.maxVal = maxVal;
    this.value = value; this.name = name;
    this.displayFn = displayFn || (v => v.toFixed(2));
    this.dragging = false;
    const frac = (value - minVal) / (maxVal - minVal);
    this.handleX = x + frac * length;
  }
  hitHandle(mx, my){
    return Math.abs(mx - this.handleX) <= 15 && Math.abs(my - (this.y+5)) <= 15;
  }
  setFromMouse(mx){
    this.handleX = Math.max(this.x, Math.min(mx, this.x + this.length));
    const frac = (this.handleX - this.x) / this.length;
    this.value = this.minVal + frac * (this.maxVal - this.minVal);
  }
  draw(){
    // track
    ctx.fillStyle = '#50505a';
    ctx.fillRect(this.x, this.y, this.length, 10);
    // handle
    ctx.beginPath();
    ctx.arc(this.handleX, this.y+5, 10, 0, Math.PI*2);
    ctx.fillStyle = '#ffb464';
    ctx.fill();
    // label
    ctx.fillStyle = '#fff';
    ctx.font = '20px DM Mono, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(`${this.name}= ${this.displayFn(this.value)}`, this.x, this.y - 10);
  }
}

const sliders = [
  new Slider(50, 50, 300, 90, 0, -1, "a", a => `${(90-a).toFixed(0)} deg`),
  new Slider(50, 100, 300, 0.5, 10, 2.0, "v", v => `${(v*100/3.6).toFixed(0)} m/s`),
  new Slider(50, 150, 300, 0.0001, 0.010, 0.001, "g", v => `${(v*1000).toFixed(2)} G`),
];

// ─── Buttons ───
class Button {
  constructor(x, y, w, h, text, cb){
    this.x=x; this.y=y; this.w=w; this.h=h; this.text=text; this.cb=cb;
  }
  hit(mx,my){ return mx>=this.x && mx<=this.x+this.w && my>=this.y && my<=this.y+this.h; }
  draw(){
    // fill
    roundRect(this.x, this.y, this.w, this.h, 8);
    ctx.fillStyle = '#643232';
    ctx.fill();
    // border
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#c86464';
    roundRect(this.x, this.y, this.w, this.h, 8);
    ctx.stroke();
    // text
    ctx.fillStyle = '#fff';
    ctx.font = '20px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.text, this.x + this.w/2, this.y + this.h/2 + 1);
  }
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

let paused = false;
let showForbidden = false;
let zoom = 1.0;               // 1.0 = default view; lower = zoomed out
const ZOOM_MIN = 0.35, ZOOM_MAX = 1.0, ZOOM_STEP = 0.15;

function clampZoom(z){ return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }

// Fire a projectile — shared by SPACE key and the LAUNCH button.
function fire(){
  if (paused) return;
  const angle = sliders[0].value;
  const speed = sliders[1].value;
  particles.push(new Particle(angle, speed));
}

function boostParticles(){
  for (const p of particles){ p.vx *= 1.1; p.vy *= 1.1; }
}
// Stacked control buttons, bottom-left (Forbidden on top, then Boost, then Pause).
const forbiddenBtn = new Button(20, HEIGHT-180, 180, 40, "Show Forbidden", () => {
  showForbidden = !showForbidden;
  forbiddenBtn.text = showForbidden ? "Hide Forbidden" : "Show Forbidden";
});
const boostBtn = new Button(20, HEIGHT-130, 180, 40, "BOOST", boostParticles);
const pauseBtn = new Button(20, HEIGHT-80, 180, 40, "Pause", () => {
  paused = !paused;
  pauseBtn.text = paused ? "Resume" : "Pause";
});
// Big touch-friendly launch button (acts like SPACE), bottom-right.
const launchBtn = new Button(WIDTH-200, HEIGHT-80, 180, 50, "LANCER ▸", fire);

// Zoom controls (top-right corner).
const zoomOutBtn = new Button(WIDTH-150, 30, 50, 40, "–", () => { zoom = clampZoom(zoom - ZOOM_STEP); });
const zoomInBtn  = new Button(WIDTH-90,  30, 50, 40, "+", () => { zoom = clampZoom(zoom + ZOOM_STEP); });

// Reposition buttons relative to the live viewport. Called on load and resize.
function layoutButtons(){
  forbiddenBtn.x = 20; forbiddenBtn.y = HEIGHT-180;
  boostBtn.x = 20;     boostBtn.y = HEIGHT-130;
  pauseBtn.x = 20;     pauseBtn.y = HEIGHT-80;
  launchBtn.x = WIDTH-200; launchBtn.y = HEIGHT-80;
  zoomOutBtn.x = WIDTH-150; zoomOutBtn.y = 30;
  zoomInBtn.x  = WIDTH-90;  zoomInBtn.y  = 30;
}

const buttons = [boostBtn, pauseBtn, forbiddenBtn, launchBtn, zoomOutBtn, zoomInBtn];

// ─── Projectiles ───
class Particle {
  constructor(angleDeg, speed){
    const angle = angleDeg * Math.PI/180;
    this.x = EARTH_POS[0] + EARTH_RADIUS;
    this.y = EARTH_POS[1];
    this.vx = speed * Math.cos(angle);
    this.vy = -speed * Math.sin(angle);
    this.trail = [];
  }
  update(GM){
    const dx = this.x - EARTH_POS[0];
    const dy = this.y - EARTH_POS[1];
    const r2 = dx*dx + dy*dy;
    const r = Math.sqrt(r2);
    if (r < EARTH_RADIUS) return false;
    const F = -GM / r2;
    this.vx += F * dx/r;
    this.vy += F * dy/r;
    this.x += this.vx;
    this.y += this.vy;
    this.trail.push([this.x, this.y]);
    if (this.trail.length > 200) this.trail.shift();
    return true;
  }
  draw(){
    ctx.fillStyle = 'rgb(200,200,100)';
    for (const [tx,ty] of this.trail){
      ctx.fillRect(tx-1, ty-1, 2, 2);
    }
    const b = sprites.bullet;
    ctx.drawImage(b, this.x-8, this.y-8, 16, 16);
  }
}
let particles = [];

// ─── Forbidden region overlay ───
function drawForbidden(speed, GM){
  const r0 = EARTH_RADIUS;
  const epsilon = 0.5*speed*speed - GM/r0;
  if (epsilon >= 0) return; // unbound: no outer forbidden region
  const rMax = -GM / epsilon;
  // Shade everything beyond rMax. Cover a region large enough to fill the view
  // even when zoomed out (the planet-centered margin matches the background).
  const margin = Math.max(WIDTH, HEIGHT) / zoom;
  ctx.save();
  ctx.beginPath();
  ctx.rect(EARTH_POS[0]-margin, EARTH_POS[1]-margin, margin*2, margin*2);
  ctx.arc(EARTH_POS[0], EARTH_POS[1], Math.max(0,rMax), 0, Math.PI*2, true);
  ctx.fillStyle = 'rgba(255,0,0,0.235)';
  ctx.fill('evenodd');
  ctx.restore();
}

// ─── Cannon angle persists while paused ───
let lastAngle = sliders[0].value;

// ─── Input ───
// Button/slider hit-tests and drawing both work in CSS-pixel coordinates
// (the draw transform applies devicePixelRatio), so map clientXY to CSS pixels.
function canvasCoords(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  return [clientX - rect.left, clientY - rect.top];
}

// Shared press handler for mouse + touch. Returns true if a control was hit.
function handlePress(mx, my){
  // controls that work regardless of pause
  if (pauseBtn.hit(mx,my))     { pauseBtn.cb(); return true; }
  if (forbiddenBtn.hit(mx,my)) { forbiddenBtn.cb(); return true; }
  if (zoomOutBtn.hit(mx,my))   { zoomOutBtn.cb(); return true; }
  if (zoomInBtn.hit(mx,my))    { zoomInBtn.cb(); return true; }
  // controls disabled while paused
  if (!paused){
    if (launchBtn.hit(mx,my)) { launchBtn.cb(); return true; }
    if (boostBtn.hit(mx,my))  { boostBtn.cb(); return true; }
    for (const s of sliders){ if (s.hitHandle(mx,my)) { s.dragging = true; return true; } }
  }
  return false;
}

canvas.addEventListener('mousedown', e => {
  const [mx,my] = canvasCoords(e.clientX, e.clientY);
  handlePress(mx, my);
});
window.addEventListener('mousemove', e => {
  if (paused) return;
  const [mx] = canvasCoords(e.clientX, e.clientY);
  for (const s of sliders){ if (s.dragging) s.setFromMouse(mx); }
});
window.addEventListener('mouseup', () => { for (const s of sliders) s.dragging = false; });

// Touch support (iPad). Prevent default so taps/drags don't scroll or zoom the page.
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const [mx,my] = canvasCoords(t.clientX, t.clientY);
  handlePress(mx, my);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (paused) return;
  const t = e.changedTouches[0];
  const [mx] = canvasCoords(t.clientX, t.clientY);
  for (const s of sliders){ if (s.dragging) s.setFromMouse(mx); }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const s of sliders) s.dragging = false;
}, {passive:false});

// Mouse wheel zoom (desktop convenience).
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = clampZoom(zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, {passive:false});

window.addEventListener('keydown', e => {
  if (e.code === 'Space'){
    e.preventDefault();
    fire();
  }
});
// Allow canvas to take keyboard focus
canvas.tabIndex = 0;
canvas.addEventListener('click', () => canvas.focus());

// ─── Main loop ───
function frame(){
  if (!paused){
    const GM = sliders[2].value * M;
    particles = particles.filter(p => p.update(GM));
  }

  // ── World layer (true camera zoom: everything scales together, centered on the planet) ──
  ctx.save();
  ctx.translate(EARTH_POS[0], EARTH_POS[1]);
  ctx.scale(zoom, zoom);
  ctx.translate(-EARTH_POS[0], -EARTH_POS[1]);

  // background (scales WITH the world like a real camera). Tile it to fill the
  // enlarged visible area when zoomed out, so no black edges show.
  ctx.fillStyle = 'rgb(10,10,30)';
  const bw = WIDTH, bh = HEIGHT;
  // Visible world rect at this zoom, centered on the planet.
  const halfW = (WIDTH/2) / zoom, halfH = (HEIGHT/2) / zoom;
  const left = EARTH_POS[0] - halfW, top = EARTH_POS[1] - halfH;
  const right = EARTH_POS[0] + halfW, bottom = EARTH_POS[1] + halfH;
  ctx.fillRect(left, top, right-left, bottom-top);
  // Tile origin aligned so the original (0,0) tile stays in place at zoom=1.
  const startX = Math.floor(left / bw) * bw;
  const startY = Math.floor(top / bh) * bh;
  for (let x = startX; x < right; x += bw){
    for (let y = startY; y < bottom; y += bh){
      ctx.drawImage(sprites.background, x, y, bw, bh);
    }
  }

  // planet (clipped to a circle so the JPEG's square corners don't show)
  ctx.save();
  ctx.beginPath();
  ctx.arc(EARTH_POS[0], EARTH_POS[1], EARTH_RADIUS, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(sprites.planet, EARTH_POS[0]-EARTH_RADIUS, EARTH_POS[1]-EARTH_RADIUS, EARTH_RADIUS*2, EARTH_RADIUS*2);
  ctx.restore();

  // forbidden region
  if (showForbidden){
    const GM = sliders[2].value * M;
    drawForbidden(sliders[1].value, GM);
  }

  // cannon (rotates only when not paused)
  if (!paused) lastAngle = sliders[0].value;
  const cannon = sprites.cannon;
  ctx.save();
  ctx.translate(EARTH_POS[0] + EARTH_RADIUS, EARTH_POS[1]);
  ctx.rotate(-lastAngle * Math.PI/180);  // canvas y is down; negative to match pygame CCW
  ctx.scale(1, -1);                      // emulate the original's vertical flip
  ctx.drawImage(cannon, -50, -30, 100, 60);
  ctx.restore();

  // projectiles
  for (const p of particles) p.draw();

  ctx.restore(); // end world layer

  // ── UI layer (fixed size, never zoomed) ──
  for (const s of sliders) s.draw();
  for (const b of buttons) b.draw();

  if (paused){
    ctx.fillStyle = 'rgb(255,100,100)';
    ctx.font = '72px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText("PAUSED", WIDTH/2, 80);
  }

  requestAnimationFrame(frame);
}

// ─── Viewport sizing ───
function resize(){
  WIDTH = window.innerWidth;
  HEIGHT = window.innerHeight;
  // Match the canvas backing buffer to CSS pixels for crisp 1:1 rendering.
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(WIDTH * dpr);
  canvas.height = Math.round(HEIGHT * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // draw in CSS-pixel coordinates
  EARTH_POS = [WIDTH/2, HEIGHT/2];
  layoutButtons();
}
window.addEventListener('resize', resize);

loadAssets(() => {
  resize();
  document.getElementById('veil').classList.add('hidden');
  canvas.focus();
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
