<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réseau classificateur 2D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#EDE4D8; --paper:#F6F0E6; --paper-edge:#E0D2BF;
    --headred:#8B1A1A; --terracotta:#C56A4A; --terracotta-soft:#E8C9B8;
    --softbrown:#5A4632; --softbrown-mute:#8A7560; --ink:#3A2E22; --slate:#5E7A99;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--cream); color:var(--softbrown); font-family:'Inter',system-ui,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:900px; margin:0 auto; padding:3rem 1.5rem 4rem; }

  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:2.2rem; line-height:1.1; color:var(--headred); margin:0 0 0.6rem; letter-spacing:-0.01em; }
  .intro{ font-size:0.97rem; max-width:64ch; margin:0 0 1.4rem; }

  .toolbar{ display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; margin:0 0 1.1rem; }
  .mini{ height:32px; padding:0 0.85rem; font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:500; border:1px solid var(--paper-edge); border-radius:8px; background:var(--paper); color:var(--softbrown); cursor:pointer; transition:background .15s; }
  .mini:hover{ background:#EFE7DA; }
  .sep{ width:1px; height:22px; background:var(--paper-edge); margin:0 0.2rem; }
  .addlbl{ font-size:0.82rem; color:var(--softbrown-mute); }
  .pill{ height:32px; padding:0 0.8rem; border-radius:8px; border:1px solid var(--paper-edge); background:var(--paper); cursor:pointer; font-size:0.82rem; font-weight:500; font-family:'Inter',sans-serif; color:var(--softbrown); display:inline-flex; align-items:center; gap:0.45rem; }
  .pill .dot{ width:11px; height:11px; border-radius:50%; }
  .pill.active{ border-color:var(--terracotta); box-shadow:0 0 0 2px var(--terracotta-soft); }

  .layout{ display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-start; }
  .colL{ flex:1 1 360px; min-width:300px; }
  .colR{ flex:1 1 320px; min-width:280px; }

  .card{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:14px; padding:0.6rem; }
  .plotbox{ position:relative; }
  .plot{ width:100%; aspect-ratio:1/1; height:auto; display:block; cursor:crosshair; border-radius:10px; }
  .overlay{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  .score{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:12px; padding:0.8rem 1.05rem; margin-top:1rem; display:flex; align-items:baseline; justify-content:space-between; }
  .score .lab{ font-size:0.82rem; color:var(--softbrown-mute); }
  .score .val{ font-family:'Fraunces',serif; font-size:1.4rem; font-weight:600; color:var(--headred); }
  .score.win{ border-color:var(--terracotta); }
  .score.win .val{ color:var(--terracotta); }

  .graphcard{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:14px; padding:0.5rem 0.6rem; }
  .graph{ width:100%; aspect-ratio:380/300; height:auto; display:block; }
  .clk{ cursor:pointer; }

  .editor{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:14px; padding:1rem 1.15rem; margin-top:1rem; min-height:56px; }
  .ed-hint{ margin:0; color:var(--softbrown-mute); font-size:0.9rem; }
  .ed-head{ display:flex; align-items:center; gap:0.6rem; margin-bottom:0.7rem; }
  .ed-title{ font-family:'Fraunces',serif; font-weight:600; font-size:1rem; color:var(--headred); }
  .ed-close{ margin-left:auto; width:28px; height:28px; border:none; background:transparent; color:var(--softbrown-mute); font-size:1.3rem; line-height:1; cursor:pointer; border-radius:6px; }
  .ed-close:hover{ background:rgba(90,70,50,0.08); color:var(--softbrown); }
  .eslider{ margin-bottom:0.75rem; }
  .eslider:last-child{ margin-bottom:0; }
  .erow{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:0.15rem; }
  .erow label{ font-size:0.86rem; color:var(--softbrown); }
  .ev{ font-family:'Inter',sans-serif; font-weight:600; font-size:0.86rem; color:var(--terracotta); }
  input[type=range]{ width:100%; accent-color:var(--terracotta); height:20px; }

  .legend{ display:flex; gap:1.1rem; flex-wrap:wrap; font-size:0.8rem; color:var(--softbrown-mute); margin-top:0.9rem; }
  .legend span{ display:inline-flex; align-items:center; gap:0.4rem; }
  .legend .dot{ width:12px; height:12px; border-radius:50%; }
  .legend .sw{ width:20px; height:4px; border-radius:2px; }

  @media (max-width:520px){ h1{ font-size:1.8rem; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Réseau classificateur 2D</h1>

  <div class="toolbar">
    <button class="mini" data-data="diag" type="button">Diagonale</button>
    <button class="mini" data-data="xor" type="button">XOR</button>
    <button class="mini" data-data="band" type="button">Bande</button>
    <button class="mini" id="clear" type="button">Effacer</button>
    <span class="sep"></span>
    <span class="addlbl">Ajouter :</span>
    <button class="pill active" id="pillA" type="button"><span class="dot" style="background:#5E7A99"></span>bleu</button>
    <button class="pill" id="pillB" type="button"><span class="dot" style="background:#C56A4A"></span>orange</button>
  </div>

  <div class="layout">
    <div class="colL">
      <div class="card">
        <div class="plotbox">
          <canvas class="plot" id="plot" width="440" height="440"></canvas>
          <svg class="overlay" id="overlay" viewBox="0 0 440 440" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
      <div class="score" id="score">
        <span class="lab">Points bien classés</span>
        <span class="val" id="scoreVal">0 / 0</span>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#5E7A99"></span>cible bleue</span>
        <span><span class="dot" style="background:#C56A4A"></span>cible orange</span>
        <span><span class="sw" style="background:var(--terracotta)"></span>poids +</span>
        <span><span class="sw" style="background:var(--slate)"></span>poids −</span>
      </div>
    </div>

    <div class="colR">
      <div class="graphcard">
        <svg class="graph" id="graph" viewBox="0 0 380 300" preserveAspectRatio="xMidYMid meet" aria-label="Graphe du réseau"></svg>
      </div>
      <div class="editor" id="editor"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const SVGNS='http://www.w3.org/2000/svg';
  const byId=id=>document.getElementById(id);
  const sigmoid=z=>1/(1+Math.exp(-z));
  const fmtT=(v,d=1)=>{ const n=Math.round(v*Math.pow(10,d))/Math.pow(10,d); return n.toFixed(d).replace('.',','); };
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);

  let W1=[[1,0],[0,1],[1,1]];
  let b1=[0,0,0];
  let W2=[1,1,1];
  let b2=-1.5;
  let points=[];
  let sel={type:null,idx:null};
  let addClass=0;
  let currentProbe=null;

  const plot=byId('plot'), ctx=plot.getContext('2d'), overlay=byId('overlay');
  const W=440, PAD=30, DMIN=-5, DMAX=5, SPAN=DMAX-DMIN;
  const px=x=>PAD+(x-DMIN)/SPAN*(W-2*PAD);
  const py=y=>PAD+(DMAX-y)/SPAN*(W-2*PAD);
  const ux=p=>DMIN+(p-PAD)/(W-2*PAD)*SPAN;
  const uy=p=>DMAX-(p-PAD)/(W-2*PAD)*SPAN;
  const COL_A='#5E7A99', COL_B='#C56A4A';

  function forward(x,y){
    const a1=[0,0,0];
    for(let k=0;k<3;k++) a1[k]=sigmoid(W1[k][0]*x+W1[k][1]*y+b1[k]);
    let z=b2; for(let k=0;k<3;k++) z+=W2[k]*a1[k];
    return {a1:a1, out:sigmoid(z)};
  }

  const N=120;
  const off=document.createElement('canvas'); off.width=N; off.height=N;
  const offctx=off.getContext('2d');
  let raf=null;
  function scheduleField(){ if(raf) return; raf=requestAnimationFrame(()=>{ raf=null; renderField(); }); }

  function renderField(){
    const img=offctx.createImageData(N,N);
    const d=img.data;
    for(let j=0;j<N;j++){
      const y=DMAX-(j+0.5)/N*SPAN;
      for(let i=0;i<N;i++){
        const x=DMIN+(i+0.5)/N*SPAN;
        let z=b2;
        for(let k=0;k<3;k++) z+=W2[k]*sigmoid(W1[k][0]*x+W1[k][1]*y+b1[k]);
        const v=sigmoid(z);
        let r,g,bb;
        if(v>=0.5){ const t=(v-0.5)*2; r=lerp(246,197,t); g=lerp(240,106,t); bb=lerp(230,74,t); }
        else { const t=(0.5-v)*2; r=lerp(246,94,t); g=lerp(240,122,t); bb=lerp(230,153,t); }
        const idx=(j*N+i)*4; d[idx]=r; d[idx+1]=g; d[idx+2]=bb; d[idx+3]=255;
      }
    }
    offctx.putImageData(img,0,0);
    ctx.clearRect(0,0,W,W);
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(off,0,0,N,N,PAD,PAD,W-2*PAD,W-2*PAD);

    ctx.strokeStyle='rgba(90,70,50,0.10)'; ctx.lineWidth=1;
    for(let g=DMIN+1;g<=DMAX-1;g++){ seg(px(g),PAD,px(g),W-PAD); seg(PAD,py(g),W-PAD,py(g)); }
    ctx.strokeStyle='rgba(90,70,50,0.30)'; ctx.lineWidth=1; seg(px(0),PAD,px(0),W-PAD); seg(PAD,py(0),W-PAD,py(0));
    ctx.strokeStyle='#D9C9B4'; ctx.lineWidth=1; ctx.strokeRect(PAD,PAD,W-2*PAD,W-2*PAD);

    let correct=0;
    points.forEach(pt=>{
      const out=forward(pt.x,pt.y).out;
      const ok=(out>0.5?1:0)===pt.c; if(ok) correct++;
      ctx.beginPath(); ctx.arc(px(pt.x),py(pt.y),6.5,0,Math.PI*2);
      ctx.fillStyle=pt.c===1?COL_B:COL_A; ctx.fill();
      ctx.lineWidth=ok?1.2:2.6; ctx.strokeStyle=ok?'rgba(58,46,34,0.55)':'#8B1A1A'; ctx.stroke();
    });
    const sv=byId('scoreVal'), sc=byId('score');
    const win=points.length>0 && correct===points.length;
    sv.textContent=correct+' / '+points.length+(win?'  \u2713':'');
    sc.classList.toggle('win',win);
  }
  function seg(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

  function mk(t,a,txt){ const e=document.createElementNS(SVGNS,t); for(const k in a) e.setAttribute(k,a[k]); if(txt!=null) e.textContent=txt; return e; }
  function actFill(t){ return 'rgb('+lerp(246,197,t)+','+lerp(240,106,t)+','+lerp(230,74,t)+')'; }
  function edgeStyle(v){ if(!v) return {stroke:'#CDBFA8',width:0.7}; return {stroke:v>0?'#C56A4A':'#5E7A99', width:0.7+Math.min(Math.abs(v)/4,1)*3}; }

  const svg=byId('graph');
  const INP=[{x:55,y:95,lab:'x'},{x:55,y:205,lab:'y'}];
  const HID=[{x:190,y:66},{x:190,y:150},{x:190,y:234}];
  const OUTN={x:330,y:150};
  const inR=18, hidR=22, outR=24;

  function renderGraph(){
    let pd=null;
    if(currentProbe){ const f=forward(currentProbe.x,currentProbe.y); pd={a1:f.a1,out:f.out,x:currentProbe.x,y:currentProbe.y}; }
    svg.innerHTML='';

    for(let s=0;s<2;s++) for(let k=0;k<3;k++){
      let st='#CDBFA8',w=0.7,op=0.5;
      if(sel.type==='hidden'&&sel.idx===k){ const e=edgeStyle(W1[k][s]); st=e.stroke; w=e.width; op=0.95; }
      svg.appendChild(mk('line',{x1:INP[s].x,y1:INP[s].y,x2:HID[k].x,y2:HID[k].y,stroke:st,'stroke-width':w,'stroke-opacity':op,'stroke-linecap':'round'}));
    }
    for(let k=0;k<3;k++){
      let st='#C9BBA2',w=0.9,op=0.55;
      if(sel.type==='output'){ const e=edgeStyle(W2[k]); st=e.stroke; w=e.width; op=0.95; }
      svg.appendChild(mk('line',{x1:HID[k].x,y1:HID[k].y,x2:OUTN.x,y2:OUTN.y,stroke:st,'stroke-width':w,'stroke-opacity':op,'stroke-linecap':'round'}));
    }

    svg.appendChild(mk('text',{x:55,y:26,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560','pointer-events':'none'},'entrée'));
    svg.appendChild(mk('text',{x:190,y:26,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560','pointer-events':'none'},'couche cachée'));
    svg.appendChild(mk('text',{x:330,y:26,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560','pointer-events':'none'},'sortie'));

    for(let s=0;s<2;s++){
      svg.appendChild(mk('circle',{cx:INP[s].x,cy:INP[s].y,r:inR,fill:'#EFE7DA',stroke:'#B7A88F','stroke-width':1.25}));
      svg.appendChild(mk('text',{x:INP[s].x,y:INP[s].y,'text-anchor':'middle','dominant-baseline':'central','font-size':13,'font-style':'italic','font-family':'Inter,sans-serif',fill:'#3A2E22','pointer-events':'none'},INP[s].lab));
      if(pd) svg.appendChild(mk('text',{x:INP[s].x,y:INP[s].y+inR+13,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#5A4632','pointer-events':'none'},fmtT(s===0?pd.x:pd.y)));
    }
    const subs=['\u2081','\u2082','\u2083'];
    for(let k=0;k<3;k++){
      const seld=(sel.type==='hidden'&&sel.idx===k);
      const c=mk('circle',{cx:HID[k].x,cy:HID[k].y,r:hidR,fill:pd?actFill(pd.a1[k]):'#EFE7DA',stroke:seld?'#8B1A1A':'#B7A88F','stroke-width':seld?3:1.25,'class':'clk'});
      c.addEventListener('click',()=>selectNode('hidden',k));
      svg.appendChild(c);
      svg.appendChild(mk('text',{x:HID[k].x,y:HID[k].y,'text-anchor':'middle','dominant-baseline':'central','font-size':12,'font-weight':500,'font-family':'Inter,sans-serif',fill:'#3A2E22','pointer-events':'none'},'a'+subs[k]));
      if(pd) svg.appendChild(mk('text',{x:HID[k].x,y:HID[k].y+hidR+13,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#5A4632','pointer-events':'none'},fmtT(pd.a1[k],2)));
    }
    const seldO=(sel.type==='output');
    const oc=mk('circle',{cx:OUTN.x,cy:OUTN.y,r:outR,fill:pd?actFill(pd.out):'#EFE7DA',stroke:seldO?'#8B1A1A':'#B7A88F','stroke-width':seldO?3:1.5,'class':'clk'});
    oc.addEventListener('click',()=>selectNode('output',0));
    svg.appendChild(oc);
    svg.appendChild(mk('text',{x:OUTN.x,y:OUTN.y,'text-anchor':'middle','dominant-baseline':'central','font-size':13,'font-weight':600,'font-family':'Inter,sans-serif',fill:'#3A2E22','pointer-events':'none'},'\u0177'));
    if(pd) svg.appendChild(mk('text',{x:OUTN.x,y:OUTN.y+outR+13,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#5A4632','pointer-events':'none'},fmtT(pd.out,2)));
  }

  function openEditor(){
    const ed=byId('editor');
    if(!sel.type){ ed.innerHTML='<p class="ed-hint">Cliquez sur un neurone caché ou de sortie pour régler ses poids et son biais.</p>'; return; }
    const subs=['\u2081','\u2082','\u2083'];
    function slider(label,value,attrs){ return '<div class="eslider"><div class="erow"><label>'+label+'</label><span class="ev">'+fmtT(value)+'</span></div><input type="range" min="-8" max="8" step="0.1" value="'+value+'" '+attrs+'></div>'; }
    if(sel.type==='hidden'){
      const k=sel.idx;
      ed.innerHTML=
        '<div class="ed-head"><span class="ed-title">Neurone caché '+(k+1)+'</span><button class="ed-close" id="edClose" aria-label="Fermer">&#215;</button></div>'+
        slider('poids depuis x',W1[k][0],'data-h="'+k+'" data-p="wx"')+
        slider('poids depuis y',W1[k][1],'data-h="'+k+'" data-p="wy"')+
        slider('biais b'+subs[k],b1[k],'data-h="'+k+'" data-p="b"');
    } else {
      ed.innerHTML=
        '<div class="ed-head"><span class="ed-title">Neurone de sortie ŷ</span><button class="ed-close" id="edClose" aria-label="Fermer">&#215;</button></div>'+
        slider('poids depuis a\u2081',W2[0],'data-o="1" data-p="w0"')+
        slider('poids depuis a\u2082',W2[1],'data-o="1" data-p="w1"')+
        slider('poids depuis a\u2083',W2[2],'data-o="1" data-p="w2"')+
        slider('biais',b2,'data-o="1" data-p="b"');
    }
    ed.querySelectorAll('input[type=range]').forEach(inp=>inp.addEventListener('input',e=>{
      const t=e.target, v=parseFloat(t.value);
      if(t.dataset.h!=null){ const k=+t.dataset.h, p=t.dataset.p; if(p==='wx')W1[k][0]=v; else if(p==='wy')W1[k][1]=v; else b1[k]=v; }
      else { const p=t.dataset.p; if(p==='b')b2=v; else W2[+p[1]]=v; }
      t.closest('.eslider').querySelector('.ev').textContent=fmtT(v);
      scheduleField(); renderGraph();
    }));
    const cl=byId('edClose'); if(cl) cl.addEventListener('click',()=>{ sel={type:null,idx:null}; openEditor(); renderGraph(); });
  }

  function selectNode(type,idx){ sel={type:type,idx:idx}; openEditor(); renderGraph(); }

  function setData(arr){ points=arr.map(p=>({x:p[0],y:p[1],c:p[2]})); renderField(); renderGraph(); }
  const DATA={
    diag:[[3,-2,0],[2,-3,0],[4,0.5,0],[1.2,-1.8,0],[3.2,-1,0],[-2,3,1],[-3,2,1],[-0.5,3.8,1],[-2,1.2,1],[-1,2.8,1]],
    xor:[[2,2,0],[2.6,1.6,0],[1.6,2.4,0],[-2,-2,0],[-2.5,-1.6,0],[-1.6,-2.4,0],[2,-2,1],[2.5,-1.5,1],[1.6,-2.4,1],[-2,2,1],[-2.6,1.6,1],[-1.6,2.5,1]],
    band:[[-3,0,0],[-1,0.4,0],[1,-0.3,0],[3,0.2,0],[0,0.5,0],[2,-0.4,0],[-3,3,1],[0,3.2,1],[3,2.8,1],[-1.5,2.5,1],[-3,-3,1],[0,-3.2,1],[3,-2.8,1],[1.5,-2.5,1]]
  };

  document.querySelectorAll('[data-data]').forEach(b=>b.addEventListener('click',()=>setData(DATA[b.dataset.data])));
  byId('clear').addEventListener('click',()=>{ points=[]; renderField(); renderGraph(); });
  byId('pillA').addEventListener('click',()=>{ addClass=0; byId('pillA').classList.add('active'); byId('pillB').classList.remove('active'); });
  byId('pillB').addEventListener('click',()=>{ addClass=1; byId('pillB').classList.add('active'); byId('pillA').classList.remove('active'); });

  plot.addEventListener('click',e=>{
    const r=plot.getBoundingClientRect();
    const x=ux((e.clientX-r.left)/r.width*W), y=uy((e.clientY-r.top)/r.height*W);
    if(x<DMIN||x>DMAX||y<DMIN||y>DMAX) return;
    points.push({x:x,y:y,c:addClass}); renderField(); renderGraph();
  });
  plot.addEventListener('mousemove',e=>{
    const r=plot.getBoundingClientRect();
    const x=ux((e.clientX-r.left)/r.width*W), y=uy((e.clientY-r.top)/r.height*W);
    if(x<DMIN||x>DMAX||y<DMIN||y>DMAX){ currentProbe=null; overlay.innerHTML=''; renderGraph(); return; }
    currentProbe={x:x,y:y};
    overlay.innerHTML='<circle cx="'+px(x).toFixed(1)+'" cy="'+py(y).toFixed(1)+'" r="7" fill="none" stroke="#3A2E22" stroke-width="1.5"/>';
    renderGraph();
  });
  plot.addEventListener('mouseleave',()=>{ currentProbe=null; overlay.innerHTML=''; renderGraph(); });

  openEditor();
  setData(DATA.xor);
})();
</script>
</body>
</html>
