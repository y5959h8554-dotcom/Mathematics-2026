<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réseau MNIST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#EDE4D8; --paper:#F6F0E6; --paper-edge:#E0D2BF;
    --headred:#8B1A1A; --terracotta:#C56A4A; --terracotta-soft:#E8C9B8;
    --softbrown:#5A4632; --softbrown-mute:#8A7560; --ink:#3A2E22; --slate:#5E7A99;
    --green:#3F7A55;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--cream); color:var(--softbrown); font-family:'Inter',system-ui,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:900px; margin:0 auto; padding:3rem 1.5rem 4rem; }

  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:2.2rem; line-height:1.1; color:var(--headred); margin:0 0 0.6rem; letter-spacing:-0.01em; }
  .intro{ font-size:0.97rem; max-width:64ch; margin:0 0 1.5rem; }

  .toolbar{ display:flex; gap:0.6rem; flex-wrap:wrap; align-items:center; margin:0 0 1.2rem; }
  .mini{ height:36px; padding:0 1rem; font-family:'Inter',sans-serif; font-size:0.86rem; font-weight:500; border:1px solid var(--paper-edge); border-radius:9px; background:var(--paper); color:var(--softbrown); cursor:pointer; transition:background .15s; }
  .mini:hover{ background:#EFE7DA; }
  .mini.primary{ background:var(--headred); border-color:var(--headred); color:#FBF3E9; }
  .mini.primary:hover{ background:#7A1616; }
  .sep{ width:1px; height:24px; background:var(--paper-edge); margin:0 0.2rem; }
  .lrwrap{ display:inline-flex; align-items:center; gap:0.55rem; font-size:0.84rem; color:var(--softbrown-mute); }
  .lrwrap input[type=range]{ width:120px; accent-color:var(--terracotta); }
  .lrwrap #lrv{ font-weight:600; color:var(--terracotta); min-width:2.5em; }

  .stats{ display:flex; gap:1rem; flex-wrap:wrap; margin:0 0 1.3rem; }
  .stat{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:12px; padding:0.7rem 1.2rem; display:flex; flex-direction:column; }
  .slab{ font-size:0.78rem; color:var(--softbrown-mute); }
  .sval{ font-family:'Fraunces',serif; font-weight:600; font-size:1.5rem; color:var(--headred); }
  .sval.big{ font-size:2rem; }

  .layout{ display:flex; gap:1.3rem; flex-wrap:wrap; align-items:stretch; margin-bottom:1.3rem; }
  .card{ background:var(--paper); border:1px solid var(--paper-edge); border-radius:14px; padding:1rem 1.1rem; }
  .card.half{ flex:1 1 340px; min-width:300px; }
  .cardlab{ font-size:0.8rem; color:var(--softbrown-mute); margin-bottom:0.7rem; }

  .schem{ width:100%; aspect-ratio:380/330; height:auto; display:block; }
  .predline{ display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap; font-size:0.92rem; margin-top:0.5rem; }
  .predline b{ font-weight:600; }
  .tiny{ height:30px; padding:0 0.75rem; font-size:0.8rem; font-family:'Inter',sans-serif; border:1px solid var(--paper-edge); border-radius:8px; background:var(--paper); color:var(--softbrown); cursor:pointer; }
  .tiny:hover{ background:#EFE7DA; }

  .curve{ width:100%; height:auto; display:block; aspect-ratio:600/340; }

  .samples{ display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:0.7rem; }
  .scell{ display:flex; flex-direction:column; align-items:center; gap:0.25rem; cursor:pointer; }
  .scell canvas{ width:48px; height:48px; image-rendering:pixelated; border-radius:5px; border:1px solid var(--paper-edge); background:#F6F0E6; }
  .scell.sel canvas{ border-color:var(--headred); box-shadow:0 0 0 2px var(--terracotta-soft); }
  .scell .pl{ font-size:0.8rem; font-weight:600; }
  .scell .pl.ok{ color:var(--green); }
  .scell .pl.no{ color:var(--headred); }

  .drawrow{ display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-start; }
  .drawcol{ display:flex; flex-direction:column; gap:0.7rem; }
  .pad{ width:224px; max-width:100%; aspect-ratio:1/1; height:auto; background:#FBF8F2; border:1px solid var(--paper-edge); border-radius:12px; cursor:crosshair; touch-action:none; display:block; }
  .drawbtns{ display:flex; gap:0.5rem; }
  .resultcol{ flex:1 1 230px; min-width:200px; display:flex; gap:1.3rem; align-items:flex-start; flex-wrap:wrap; }
  .seenwrap{ display:flex; flex-direction:column; align-items:center; gap:0.3rem; }
  .seenlab{ font-size:0.74rem; color:var(--softbrown-mute); }
  .seen{ width:84px; height:84px; image-rendering:pixelated; border:1px solid var(--paper-edge); border-radius:8px; background:#FBF8F2; }
  .bigpred{ font-family:'Fraunces',serif; font-weight:600; font-size:3.4rem; line-height:1; color:var(--headred); min-width:1.1em; text-align:center; }
  .probs{ flex:1 1 170px; min-width:150px; display:flex; flex-direction:column; gap:3px; }
  .prow{ display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; }
  .prow .d{ width:0.9em; font-weight:600; color:var(--softbrown); }
  .prow .track{ flex:1; height:8px; background:var(--paper-edge); border-radius:5px; overflow:hidden; }
  .prow .fill{ height:100%; width:0; background:var(--slate); border-radius:5px; }
  .prow.top .fill{ background:var(--terracotta); }
  .prow .pct{ width:2.6em; text-align:right; color:var(--softbrown-mute); font-variant-numeric:tabular-nums; }
  .prow.top .pct{ color:var(--terracotta); font-weight:600; }

  @media (max-width:520px){ h1{ font-size:1.8rem; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Réseau MNIST</h1>

  <div class="toolbar">
    <button class="mini" id="reset" type="button">Réinitialiser le réseau</button>
    <button class="mini" id="step" type="button">+1 époque</button>
    <button class="mini primary" id="run" type="button">&#9654; Entraîner</button>
    <span class="sep"></span>
    <span class="lrwrap">taux d'apprentissage <input type="range" id="lr" min="0.05" max="1" step="0.05" value="0.3"><span id="lrv">0,30</span></span>
  </div>

  <div class="stats">
    <div class="stat"><span class="slab">Époque</span><span class="sval" id="epochV">0</span></div>
    <div class="stat"><span class="slab">Précision (test)</span><span class="sval big" id="accV">&mdash;</span></div>
  </div>

  <div class="layout">
    <div class="card half">
      <div class="cardlab">Le réseau sur un exemple</div>
      <svg class="schem" id="schem" viewBox="0 0 380 330" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="predline" id="predline"></div>
    </div>
    <div class="card half">
      <div class="cardlab">Précision au fil de l'entraînement</div>
      <canvas class="curve" id="curve" width="600" height="340"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="cardlab">Dessinez un chiffre de 0 à 9 &mdash; le réseau le classe (entraînez-le d'abord)</div>
    <div class="drawrow">
      <div class="drawcol">
        <canvas class="pad" id="pad" width="252" height="252"></canvas>
        <div class="drawbtns"><button class="mini" id="clearPad" type="button">Effacer</button></div>
      </div>
      <div class="resultcol">
        <div class="seenwrap"><span class="seenlab">vu par le réseau</span><canvas class="seen" id="seen" width="28" height="28"></canvas></div>
        <div class="bigpred" id="bigpred">&mdash;</div>
        <div class="probs" id="probs"></div>
      </div>
    </div>
  </div>
</div>

  const sig = z => 1/(1+Math.exp(-z));
  function fwd(x){
    const a1=new Float32Array(NH);
    for(let h=0;h<NH;h++){ let z=b1[h]; const base=h*NI; for(let i=0;i<NI;i++) z+=W1[base+i]*x[i]; a1[h]=sig(z); }
    const z2=new Float32Array(NO); let mx=-1e9;
    for(let o=0;o<NO;o++){ let z=b2[o]; const base=o*NH; for(let h=0;h<NH;h++) z+=W2[base+h]*a1[h]; z2[o]=z; if(z>mx) mx=z; }
    let sum=0; const out=new Float32Array(NO);
    for(let o=0;o<NO;o++){ out[o]=Math.exp(z2[o]-mx); sum+=out[o]; }
    for(let o=0;o<NO;o++) out[o]/=sum;
    return {a1,out};
  }
  function predict(x){ const {out}=fwd(x); let a=0; for(let o=1;o<NO;o++) if(out[o]>out[a]) a=o; return a; }
  function sgdStep(x,y,lr){
    const {a1,out}=fwd(x);
    const dz2=new Float32Array(NO);
    for(let o=0;o<NO;o++) dz2[o]=out[o]-(o===y?1:0);
    const da1=new Float32Array(NH);
    for(let h=0;h<NH;h++){ let g=0; for(let o=0;o<NO;o++) g+=dz2[o]*W2[o*NH+h]; da1[h]=g*a1[h]*(1-a1[h]); }
    for(let o=0;o<NO;o++){ const base=o*NH; const d=lr*dz2[o]; for(let h=0;h<NH;h++) W2[base+h]-=d*a1[h]; b2[o]-=d; }
    for(let h=0;h<NH;h++){ const base=h*NI; const d=lr*da1[h]; if(d!==0){ for(let i=0;i<NI;i++){ if(x[i]) W1[base+i]-=d; } } b1[h]-=d; }
  }

  // ---- training state ----
  let lr=0.3, epoch=0, order=[], pos=0, hist=[];
  function reshuffle(){ order=Array.from({length:TR.X.length},(_,i)=>i); for(let i=order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=order[i]; order[i]=order[j]; order[j]=t; } pos=0; }
  function trainSteps(n){
    let done=0;
    for(let s=0;s<n;s++){
      sgdStep(TR.X[order[pos]], TR.Y[order[pos]], lr); pos++;
      if(pos>=order.length){ reshuffle(); epoch++; done++; }
    }
    return done;
  }
  function testAcc(){ let c=0; for(let s=0;s<TE.X.length;s++) if(predict(TE.X[s])===TE.Y[s]) c++; return c/TE.X.length; }
  function trainAccSub(){ const n=Math.min(500,TR.X.length); let c=0; for(let s=0;s<n;s++) if(predict(TR.X[s])===TR.Y[s]) c++; return c/n; }
  function evaluate(){ hist.push({e:epoch, test:testAcc(), train:trainAccSub()}); }

  // ---- rendering helpers ----
  const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
  function actFill(t){ t=Math.max(0,Math.min(1,t)); return 'rgb('+lerp(246,197,t)+','+lerp(240,106,t)+','+lerp(230,74,t)+')'; }
  function mk(t,a,txt){ const e=document.createElementNS(SVGNS,t); for(const k in a) e.setAttribute(k,a[k]); if(txt!=null) e.textContent=txt; return e; }

  const dURLcanvas=document.createElement('canvas'); dURLcanvas.width=28; dURLcanvas.height=28;
  function drawDigit(ctx,x){
    const img=ctx.createImageData(28,28);
    for(let i=0;i<784;i++){ const v=x[i]>0.5; const idx=i*4; img.data[idx]=v?44:246; img.data[idx+1]=v?44:240; img.data[idx+2]=v?42:230; img.data[idx+3]=255; }
    ctx.putImageData(img,0,0);
  }
  function digitURL(x){ drawDigit(dURLcanvas.getContext('2d'),x); return dURLcanvas.toDataURL(); }

  // ---- schematic ----
  const schem=byId('schem');
  let curInput=TE.X[0], curURL=digitURL(TE.X[0]), curTruth=TE.Y[0], curSampleIdx=0;
  const HID_X=185, OUT_X=320, IMG={x:14,y:124,w:82,h:82};
  function hidY(h){ return 22 + h*(296/(NH-1)); }
  function outY(o){ return 56 + o*(220/(NO-1)); }
  function setExample(idx){ curInput=TE.X[idx]; curURL=digitURL(TE.X[idx]); curTruth=TE.Y[idx]; curSampleIdx=idx; renderSchem(); markSelectedSample(); }

  function renderSchem(){
    const {a1,out}=fwd(curInput);
    let pred=0; for(let o=1;o<NO;o++) if(out[o]>out[pred]) pred=o;
    schem.innerHTML='';
    for(let h=0;h<NH;h++) for(let o=0;o<NO;o++){
      schem.appendChild(mk('line',{x1:HID_X,y1:hidY(h),x2:OUT_X,y2:outY(o),stroke:'#CDBEA4','stroke-width':0.65,'stroke-opacity':0.6}));
    }
    for(let h=0;h<NH;h++){
      schem.appendChild(mk('line',{x1:IMG.x+IMG.w,y1:IMG.y+IMG.h/2,x2:HID_X,y2:hidY(h),stroke:'#B49F80','stroke-width':0.85,'stroke-opacity':0.92}));
    }
    schem.appendChild(mk('text',{x:IMG.x+IMG.w/2,y:IMG.y-8,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560'},'entrée 28×28'));
    schem.appendChild(mk('text',{x:HID_X,y:12,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560'},'16 cachés'));
    schem.appendChild(mk('text',{x:OUT_X+4,y:40,'text-anchor':'middle','font-size':10.5,'font-family':'Inter,sans-serif',fill:'#8A7560'},'sortie'));
    schem.appendChild(mk('image',{x:IMG.x,y:IMG.y,width:IMG.w,height:IMG.h,href:curURL,'image-rendering':'pixelated'}));
    schem.appendChild(mk('rect',{x:IMG.x,y:IMG.y,width:IMG.w,height:IMG.h,fill:'none',stroke:'#D9C9B4','stroke-width':1,rx:4}));
    for(let h=0;h<NH;h++) schem.appendChild(mk('circle',{cx:HID_X,cy:hidY(h),r:7,fill:actFill(a1[h]),stroke:'#B7A88F','stroke-width':1}));
    for(let o=0;o<NO;o++){
      const seld=(o===pred);
      schem.appendChild(mk('circle',{cx:OUT_X,cy:outY(o),r:11,fill:actFill(out[o]),stroke:seld?'#8B1A1A':'#B7A88F','stroke-width':seld?2.5:1}));
      schem.appendChild(mk('text',{x:OUT_X,y:outY(o),'text-anchor':'middle','dominant-baseline':'central','font-size':11,'font-weight':seld?600:500,'font-family':'Inter,sans-serif',fill:'#3A2E22'},''+o));
      schem.appendChild(mk('text',{x:OUT_X+22,y:outY(o),'dominant-baseline':'central','font-size':9.5,'font-family':'Inter,sans-serif',fill:'#8A7560'},Math.round(out[o]*100)+'%'));
    }
    let pl;
    if(curTruth==null){ pl='Prédiction : <b style="color:var(--headred)">'+pred+'</b> &nbsp;·&nbsp; <span style="color:var(--softbrown-mute)">votre dessin</span>'; }
    else { const ok=pred===curTruth; pl='Prédiction : <b style="color:'+(ok?'var(--green)':'var(--headred)')+'">'+pred+'</b> &nbsp;·&nbsp; étiquette réelle : <b>'+curTruth+'</b>'; }
    pl+=' <button class="tiny" id="randex" type="button">&#8635; autre exemple</button>';
    byId('predline').innerHTML=pl;
    byId('randex').addEventListener('click',()=>setExample((Math.random()*TE.X.length)|0));
  }

  // ---- accuracy curve ----
  const curve=byId('curve'), cctx=curve.getContext('2d');
  const CW=600, CH=340, CM={l:46,r:16,t:18,b:34};
  function cx(e,maxE){ return CM.l + (maxE<=0?0:e/maxE)*(CW-CM.l-CM.r); }
  function cy(a){ return CM.t + (1-a)*(CH-CM.t-CM.b); }
  function renderCurve(){
    cctx.clearRect(0,0,CW,CH);
    const maxE=Math.max(10, epoch);
    // gridlines + y labels
    cctx.strokeStyle='#E3D5C2'; cctx.lineWidth=1; cctx.fillStyle='#8A7560'; cctx.font='12px Inter, sans-serif'; cctx.textAlign='right'; cctx.textBaseline='middle';
    [0,0.25,0.5,0.75,1].forEach(a=>{
      const y=cy(a); cctx.beginPath(); cctx.moveTo(CM.l,y); cctx.lineTo(CW-CM.r,y); cctx.stroke();
      cctx.fillText(Math.round(a*100)+'%', CM.l-8, y);
    });
    // x label
    cctx.textAlign='center'; cctx.textBaseline='top';
    cctx.fillText('époques  (0 → '+maxE+')', (CM.l+CW-CM.r)/2, CH-CM.b+12);
    // axes
    cctx.strokeStyle='#C2AF95'; cctx.lineWidth=1.2;
    cctx.beginPath(); cctx.moveTo(CM.l,CM.t); cctx.lineTo(CM.l,CH-CM.b); cctx.lineTo(CW-CM.r,CH-CM.b); cctx.stroke();
    if(hist.length===0) return;
    // train line (faint slate)
    cctx.strokeStyle='#5E7A99'; cctx.lineWidth=1.6; cctx.globalAlpha=0.55; cctx.beginPath();
    hist.forEach((p,i)=>{ const X=cx(p.e,maxE), Y=cy(p.train); i?cctx.lineTo(X,Y):cctx.moveTo(X,Y); }); cctx.stroke(); cctx.globalAlpha=1;
    // test line (terracotta)
    cctx.strokeStyle='#C56A4A'; cctx.lineWidth=2.4; cctx.beginPath();
    hist.forEach((p,i)=>{ const X=cx(p.e,maxE), Y=cy(p.test); i?cctx.lineTo(X,Y):cctx.moveTo(X,Y); }); cctx.stroke();
    // last point marker
    const last=hist[hist.length-1];
    cctx.fillStyle='#C56A4A'; cctx.beginPath(); cctx.arc(cx(last.e,maxE),cy(last.test),3.5,0,Math.PI*2); cctx.fill();
    // legend
    cctx.textAlign='left'; cctx.textBaseline='middle'; cctx.font='12px Inter, sans-serif';
    cctx.fillStyle='#C56A4A'; cctx.fillRect(CM.l+8,CM.t+6,16,3); cctx.fillStyle='#5A4632'; cctx.fillText('test', CM.l+28, CM.t+8);
    cctx.fillStyle='#5E7A99'; cctx.globalAlpha=0.55; cctx.fillRect(CM.l+74,CM.t+6,16,3); cctx.globalAlpha=1; cctx.fillStyle='#5A4632'; cctx.fillText('entraînement', CM.l+94, CM.t+8);
  }

  // ---- samples panel removed ----
  function markSelectedSample(){}

  // ---- stats ----
  function renderStats(){ byId('epochV').textContent=epoch; byId('accV').textContent=Math.round(hist[hist.length-1].test*100)+' %'; }
  function renderAll(){ renderStats(); renderSchem(); renderCurve(); }

  // ---- controls ----
  let running=false, rafId=null;
  const runBtn=byId('run');
  function setRunning(v){
    running=v;
    runBtn.innerHTML = v ? '&#10073;&#10073; Pause' : '&#9654; Entraîner';
    runBtn.classList.toggle('primary', !v);
    if(v){ rafId=requestAnimationFrame(loop); } else if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  }
  function loop(){
    if(!running) return;
    const done=trainSteps(800);
    if(done>0){ evaluate(); renderAll(); }
    rafId=requestAnimationFrame(loop);
  }
  byId('run').addEventListener('click',()=>setRunning(!running));
  byId('step').addEventListener('click',()=>{ trainSteps(order.length-pos); evaluate(); renderAll(); });
  byId('reset').addEventListener('click',()=>{
    setRunning(false); initNet(); epoch=0; reshuffle(); hist=[]; evaluate(); renderAll();
  });
  byId('lr').addEventListener('input',e=>{ lr=parseFloat(e.target.value); byId('lrv').textContent=fmt2(lr); });

  // ---- draw your own digit ----
  const pad=byId('pad'), pctx=pad.getContext('2d');
  pctx.lineCap='round'; pctx.lineJoin='round'; pctx.lineWidth=18; pctx.strokeStyle='#2C2C2A';
  let drawing=false, lastP=null;
  function padPos(e){ const r=pad.getBoundingClientRect(); const t=e.touches&&e.touches[0]; const cx=t?t.clientX:e.clientX, cy=t?t.clientY:e.clientY; return {x:(cx-r.left)/r.width*pad.width, y:(cy-r.top)/r.height*pad.height}; }
  function dStart(e){ drawing=true; lastP=padPos(e); pctx.beginPath(); pctx.moveTo(lastP.x,lastP.y); pctx.lineTo(lastP.x+0.01,lastP.y+0.01); pctx.stroke(); if(e.cancelable) e.preventDefault(); }
  function dMove(e){ if(!drawing) return; const p=padPos(e); pctx.beginPath(); pctx.moveTo(lastP.x,lastP.y); pctx.lineTo(p.x,p.y); pctx.stroke(); lastP=p; if(e.cancelable) e.preventDefault(); }
  function dEnd(){ if(!drawing) return; drawing=false; classifyDraw(); }
  pad.addEventListener('mousedown',dStart); pad.addEventListener('mousemove',dMove); window.addEventListener('mouseup',dEnd);
  pad.addEventListener('touchstart',dStart,{passive:false}); pad.addEventListener('touchmove',dMove,{passive:false}); pad.addEventListener('touchend',dEnd);
  byId('clearPad').addEventListener('click',()=>{ pctx.clearRect(0,0,pad.width,pad.height); byId('bigpred').textContent='\u2014'; byId('probs').innerHTML=''; byId('seen').getContext('2d').clearRect(0,0,28,28); });

  function processPad(){
    const Wd=pad.width;
    const data=pctx.getImageData(0,0,Wd,Wd).data;
    let minX=Wd,minY=Wd,maxX=-1,maxY=-1;
    for(let y=0;y<Wd;y++) for(let x=0;x<Wd;x++){ if(data[(y*Wd+x)*4+3]>40){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } }
    if(maxX<0) return null;
    const bw=maxX-minX+1, bh=maxY-minY+1;
    const scale=20/Math.max(bw,bh), dw=bw*scale, dh=bh*scale;
    const t=document.createElement('canvas'); t.width=28; t.height=28;
    const tc=t.getContext('2d'); tc.imageSmoothingEnabled=true;
    tc.drawImage(pad, minX,minY,bw,bh, (28-dw)/2,(28-dh)/2, dw,dh);
    const td=tc.getImageData(0,0,28,28).data;
    const g=new Float32Array(784);
    for(let i=0;i<784;i++) g[i]=td[i*4+3]/255;
    let sx=0,sy=0,sm=0;
    for(let y=0;y<28;y++) for(let x=0;x<28;x++){ const v=g[y*28+x]; sx+=x*v; sy+=y*v; sm+=v; }
    const res=new Float32Array(784);
    if(sm>0){
      const dxs=Math.round(14-sx/sm), dys=Math.round(14-sy/sm);
      for(let y=0;y<28;y++) for(let x=0;x<28;x++){ const nx=x+dxs, ny=y+dys; if(nx>=0&&nx<28&&ny>=0&&ny<28) res[ny*28+nx]= g[y*28+x]>0.35?1:0; }
    }
    return res;
  }
  function classifyDraw(){
    const x=processPad();
    if(!x) return;
    drawDigit(byId('seen').getContext('2d'), x);
    const {out}=fwd(x);
    let pred=0; for(let o=1;o<NO;o++) if(out[o]>out[pred]) pred=o;
    byId('bigpred').textContent=pred;
    const cont=byId('probs'); cont.innerHTML='';
    for(let o=0;o<NO;o++){
      const row=document.createElement('div'); row.className='prow'+(o===pred?' top':'');
      row.innerHTML='<span class="d">'+o+'</span><span class="track"><span class="fill" style="width:'+(out[o]*100).toFixed(1)+'%"></span></span><span class="pct">'+Math.round(out[o]*100)+'%</span>';
      cont.appendChild(row);
    }
    curInput=x; curURL=digitURL(x); curTruth=null; curSampleIdx=-1; renderSchem(); markSelectedSample();
  }

  // ---- init ----
  initNet(); reshuffle(); evaluate();
  renderAll();
})();
</script>
</body>
</html>
